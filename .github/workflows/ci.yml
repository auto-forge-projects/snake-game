name: "CI"
on:
  push:
    branches: [main, master]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: "Test (varsa)"
        run: |
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.test?0:1)" 2>/dev/null; then
            if [ -f package-lock.json ]; then npm ci --no-audit --no-fund; else npm install --no-audit --no-fund; fi
            npm test
          else
            echo "test script yok — atlandı"
          fi
  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Docker imaj build doğrulama (artefakt üretimi, push yok)"
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ci-artifact:${{ github.sha }} .
          else
            echo "Dockerfile yok — atlandı"
          fi
